server.port=8080
spring.application.name=project-analyzer-agent

# DeepSeek API Configuration
deepseek.api.key=${DEEPSEEK_API_KEY:}

# Logging Configuration
logging.level.com.bupt.cqy.analyzer=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# HTTP Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Interactive audit budgets (token/cost guardrails)
interactive.audit.max.file.read.calls=40
interactive.audit.max.total.read.lines=8000
interactive.audit.max.lines.per.call=240
interactive.audit.target.lines.per.call=160
interactive.audit.min.lines.per.call=120
interactive.audit.max.visited.files=120
interactive.audit.max.repeated.reads=2
interactive.audit.max.overlap.ratio=0.80
interactive.audit.max.inefficient.calls=6
interactive.audit.map.max.files.in.prompt=160
interactive.audit.max.exploration.notes.chars=20000
interactive.audit.max.map.chars.in.synthesis=24000

# RAG chat budgets / timeout guardrails
rag.chat.vector.top-k=4
rag.chat.keyword.top-k=2
rag.chat.min-score=0.35
rag.chat.max-context-chars=8000
rag.chat.max-memory-turns=4
rag.chat.max-memory-context-chars=2500
rag.chat.enable.agentic.audit=false
rag.chat.agentic.audit.timeout.ms=8000
rag.chat.max-agentic-notes.chars=3000
rag.chat.sse.timeout.ms=600000
rag.chat.sse.heartbeat.ms=15000
